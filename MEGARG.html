        Object.values(gameStages).forEach(s => {
            totalMaxScore += (s.score !== undefined ? s.score : 1);
        });

        window.onload = () => { 
            updateTargetDisplay(); 
            renderTaskContent(); 
            renderRecord(); 
        };

        function showCustomAlert(message, title = "時空起點") {
            document.getElementById('custom-modal-title').innerText = title;
            document.getElementById('custom-modal-message').innerHTML = message;
            document.getElementById('custom-modal-btn-cancel').style.display = 'none';
            document.getElementById('custom-modal-btn-ok').onclick = closeCustomModal;
            document.getElementById('custom-modal-overlay').classList.add('open');
        }

        function showCustomConfirm(message, onConfirm, title = "時空起點") {
            document.getElementById('custom-modal-title').innerText = title;
            document.getElementById('custom-modal-message').innerHTML = message;
            document.getElementById('custom-modal-btn-cancel').style.display = 'block';
            document.getElementById('custom-modal-btn-cancel').onclick = closeCustomModal;
            document.getElementById('custom-modal-btn-ok').onclick = () => { 
                closeCustomModal(); 
                if(onConfirm) onConfirm(); 
            };
            document.getElementById('custom-modal-overlay').classList.add('open');
        }

        function closeCustomModal() { document.getElementById('custom-modal-overlay').classList.remove('open'); }

        function startGame() {
            const startScreen = document.getElementById('start-screen');
            startScreen.classList.add('fade-out');
            setTimeout(() => { startScreen.style.display = 'none'; }, 800);
        }

        function showTab(index) {
            const contents = document.querySelectorAll('.tab-content');
            const btns = document.querySelectorAll('.tab-btn');
            contents.forEach((c, i) => c.classList.toggle('active', i === index));
            btns.forEach((b, i) => b.classList.toggle('active', i === index));
            if (contents[index]) contents[index].scrollTop = 0;
            if (index === 1 && map) setTimeout(() => map.invalidateSize(), 300);
            if (index === 3) setTimeout(() => updateRecordMap(), 300);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const y = Math.sin((lon2-lon1)*Math.PI/180) * Math.cos(lat2*Math.PI/180);
            const x = Math.cos(lat1*Math.PI/180) * Math.sin(lat2*Math.PI/180) - Math.sin(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.cos((lon2-lon1)*Math.PI/180);
            const brng = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
            const sectors = ["北方 ⬆️", "東北方 ↗️", "東方 ➡️", "東南方 ↘️", "南方 ⬇️", "西南方 ↙️", "西方 ⬅️", "西北方 ↖️"];
            return sectors[Math.round(brng / 45) % 8];
        }

        function getMediaHtml(url) {
            if (!url) return '';
            let formattedUrl = url;
            const imgMatch = formattedUrl.match(/#(d+),(d+),(d+),(d+)$/);
            if (imgMatch) {
                formattedUrl = formattedUrl.replace(/#d+,d+,d+,d+$/, '');
            }
            
            const ytMatch = formattedUrl.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
            if (ytMatch) {
                const vid = ytMatch[1];
                return `<div style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:12px; margin:20px 0; background:#000;">
                    <iframe src="https://www.youtube-nocookie.com/embed/${vid}?autoplay=1&mute=1&playsinline=1&rel=0" style="position:absolute; top:0; left:0; width:100%; height:100%; border:0;" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                <a href="${url}" target="_blank" style="display:block; text-align:center; background:#cc0000; color:white; padding:12px; border-radius:8px; text-decoration:none; font-weight:bold; margin-bottom:20px; box-shadow:0 4px 6px rgba(255,0,0,0.2);">🎬 點擊在 YouTube 開啟影片</a>`;
            }
            
            if (imgMatch) {
                const [_, x, y, w, h] = imgMatch;
                return `<div style="width:100%; height:200px; margin:20px 0; border-radius:12px; border:1px solid var(--border-color); background-image:url('${formattedUrl}'); background-position:-${x}px -${y}px; background-size:auto; background-repeat:no-repeat;"></div>`;
            }
            return `<img src="${formattedUrl}" class="puzzle-img" onerror="this.style.display='none';">`;
        }

        function updateTargetDisplay() {
            const stage = gameStages[currentStageId];
            if (currentPhase === 'END') {
                document.getElementById('target-name').innerText = "任務完成";
                document.getElementById('dist-display').innerText = "";
                document.getElementById('bearing-display').innerText = "已抵達最終地點";
                document.getElementById('gps-btn').style.display = "none";
                document.getElementById('map').style.visibility = "hidden";
            } else if (currentPhase === 'PRELUDE') {
                document.getElementById('target-name').innerText = "等待出發中";
                document.getElementById('dist-display').innerText = "--";
                document.getElementById('bearing-display').innerText = "請先在「任務」頁籤閱讀任務簡報";
                document.getElementById('gps-btn').disabled = true;
                document.getElementById('map').style.visibility = "hidden";
            } else {
                document.getElementById('target-name').innerText = stage.name;
                document.getElementById('dist-display').innerText = "-- 公尺";
                document.getElementById('bearing-display').innerText = "等待讀取您的位置...";
                document.getElementById('gps-btn').disabled = false;
                document.getElementById('gps-btn').style.display = "block";
                document.getElementById('map').style.visibility = "visible";
                if(!map) {
                    map = L.map('map', { zoomControl: false }).setView([stage.lat, stage.lon], 16);
                    L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 20 }).addTo(map);
                    targetMarker = L.marker([stage.lat, stage.lon]).addTo(map).bindPopup(stage.name).openPopup();
                } else {
                    targetMarker.setLatLng([stage.lat, stage.lon]).setPopupContent(stage.name).openPopup();
                }
                setTimeout(() => { if (map) map.invalidateSize(); }, 300);
            }
        }

        function updateGPS() {
            const stage = gameStages[currentStageId];
            if (currentPhase === 'END' || currentPhase === 'PRELUDE') return;
            const btn = document.getElementById('gps-btn');
            btn.disabled = true; btn.innerText = "🔄 取得精確定位中...";

            navigator.geolocation.getCurrentPosition(pos => {
                const { latitude: uLat, longitude: uLon } = pos.coords;
                const dist = calculateDistance(uLat, uLon, stage.lat, stage.lon);
                const bear = calculateBearing(uLat, uLon, stage.lat, stage.lon);
                renderMapWithBothMarkers(uLat, uLon, stage.lat, stage.lon, stage.name);
                document.getElementById('dist-display').innerText = Math.round(dist) + " 公尺";
                document.getElementById('bearing-display').innerHTML = "目標位於您的：<b>" + bear + "</b>";
                btn.disabled = false; btn.innerText = "📍 檢查我的位置";

                const targetRadius = stage.triggerRadius !== undefined ? stage.triggerRadius : 150;

                if (dist <= targetRadius && currentPhase === 'NAVIGATING') {
                    currentPhase = 'PUZZLE'; renderTaskContent();
                    showCustomAlert("✅ 抵達目標地點！任務內容已解鎖，請查看「任務」頁籤。");
                    showTab(2); 
                } else if (dist > targetRadius && currentPhase === 'PUZZLE') {
                    currentPhase = 'NAVIGATING'; renderTaskContent(); 
                }
            }, err => {
                showCustomAlert("⚠️ 定位失敗，請確認手機已開啟 GPS 且瀏覽器有位置權限。");
                btn.disabled = false; btn.innerText = "📍 重新檢查位置";
            }, { enableHighAccuracy: true, timeout: 10000 });
        }

        function renderMapWithBothMarkers(uLat, uLon, tLat, tLon, tName) {
            if (!map) return; 
            if (!userMarker) {
                userMarker = L.circleMarker([uLat, uLon], { radius: 8, fillColor: '#007bff', color: '#fff', weight: 3, fillOpacity: 1 }).addTo(map).bindPopup("您在這裡");
            } else { userMarker.setLatLng([uLat, uLon]); }
            targetMarker.setLatLng([tLat, tLon]).setPopupContent(tName);
            const bounds = L.latLngBounds([uLat, uLon], [tLat, tLon]);
            map.fitBounds(bounds, { padding: [40, 40] });
        }

        function startHintTimer(seconds, hintImg, hintText) {
            clearInterval(hintTimerInterval);
            let timeLeft = seconds;
            const hintDiv = document.getElementById('hint-container');
            if(!hintDiv) return;
            
            hintDiv.innerHTML = `<div style="margin-top:20px; padding:15px; background:var(--bg-color); border:1px solid var(--accent-color); border-radius:8px; text-align:center; color:var(--text-color); font-weight:bold;">⏳ 提示將於 <span id="hint-countdown" style="color:var(--accent-color); font-size:1.2em;">${timeLeft}</span> 秒後解鎖...</div>`;
            hintDiv.style.display = 'block';

            hintTimerInterval = setInterval(() => {
                timeLeft--;
                const cdSpan = document.getElementById('hint-countdown');
                if(cdSpan) cdSpan.innerText = timeLeft;
                
                if(timeLeft <= 0) {
                    clearInterval(hintTimerInterval);
                    let hintMedia = getMediaHtml(hintImg);
                    hintDiv.innerHTML = `<div style="margin-top:20px; padding:20px; background:var(--bg-color); border:1px solid var(--border-color); border-radius:10px; animation:fadeIn 0.5s ease;"><h4 style="color:var(--text-color); margin-top:0; border-bottom:1px solid var(--border-color); padding-bottom:10px;">💡 關卡提示</h4>${hintMedia}<p style="color:var(--text-color); font-size:1em; margin-bottom:0; text-align:left;">${hintText || '無'}</p></div>`;
                }
            }, 1000);
        }

        function renderTaskContent() {
            const container = document.getElementById('puzzle-content');
            const stage = gameStages[currentStageId];
            if (!stage) return;
            
            const targetRadius = stage.triggerRadius !== undefined ? stage.triggerRadius : 150;
            clearInterval(hintTimerInterval);

            switch(currentPhase) {
                case 'PRELUDE': {
                    const pMediaHtml = getMediaHtml(stage.preludeImg);
                    container.innerHTML = `<div class="puzzle-box"><h2 class="story-title">📜 ${stage.preludeTitle}</h2>${pMediaHtml}<p class="story-text">${stage.preludeStory||'無'}</p><button class="submit-btn" style="margin-top:20px; font-size: 1.1em;" onclick="startNavigating()">確認任務，前往地圖定位出發</button></div>`;
                    break;
                }
                case 'NAVIGATING': {
                    const navMediaHtml = getMediaHtml(stage.preludeImg);
                    container.innerHTML = `<div class="puzzle-box"><h2 class="story-title">📜 ${stage.preludeTitle}</h2>${navMediaHtml}<p class="story-text">${stage.preludeStory||'無'}</p><div style="margin-top: 20px; padding: 15px; background: var(--bg-color); border: 1px solid var(--primary-color); border-radius: 8px; text-align: center;"><p style="margin: 0 0 10px 0; color: var(--text-color); font-weight: bold;">📍 導航中：請前往指定地點<br><span style="font-size:0.9em;font-weight:normal;opacity:0.8;">進入範圍 ${targetRadius} 公尺內，系統將自動解鎖現場任務</span></p><button class="btn-check" style="width:100%; padding:12px; font-size:1.05em;" onclick="showTab(1)">查看地圖指引</button></div></div>`;
                    break;
                }
                case 'PUZZLE': {
                    const sMediaHtml = getMediaHtml(stage.img);
                    let hintHtml = '<div id="hint-container" style="display:none;"></div>';
                    
                    container.innerHTML = `<div class="puzzle-box"><h3 class="story-title">📖 抵達現場：發現線索</h3><p class="story-text">${stage.story||''}</p>${sMediaHtml}<div style="height: 1px; background: var(--border-color); margin: 25px 0;"></div><div class="puzzle-question">🧩 現場謎題：<br><span style="font-weight:normal; opacity:0.8;">${stage.puzzle||''}</span></div><input type="text" id="ans-input" placeholder="輸入答案..."><button class="submit-btn" onclick="checkAnswer()">驗證答案</button>${hintHtml}</div>`;
                    
                    if (stage.hintTime > 0) {
                        startHintTimer(Math.floor(stage.hintTime * 60), stage.hintImg, stage.hintText);
                    }
                    break;
                }
                case 'CLEARED': {
                    let optionsHtml = "";
                    if (stage.hasBranch) {
                        stage.branches.forEach(branch => { 
                            optionsHtml += `<button class="branch-btn" onclick="selectBranch('${branch.nextStageId}')">${branch.text}</button>`; 
                        });
                    } else if(stage.nextStageId) {
                        optionsHtml = `<button class="branch-btn" onclick="selectBranch('${stage.nextStageId}')">繼續前進</button>`;
                    } else {
                        optionsHtml = `<button class="branch-btn" onclick="showCustomAlert('沒有設定後續關卡！')">已無後續關卡</button>`;
                    }
                    container.innerHTML = `<div class="puzzle-box"><div class="success-banner">✨ 解謎成功！ (+${stage.score} 分)</div><p class="story-text">你順利解開了這個區域的祕密。接下來，你打算怎麼做？</p><div class="branch-options">${optionsHtml}</div></div>`;
                    break;
                }
                case 'END': {
                    const eMediaHtml = getMediaHtml(stage.endImg);
                    container.innerHTML = `<div class="puzzle-box"><h2 style="color:var(--accent-color)">🎉 遊戲通關！</h2>${eMediaHtml}<p class="story-text" style="text-align:left;">${stage.endStory||'🎉 遊戲通關！'}</p><div style="background:var(--bg-color); color:var(--text-color); font-size:1.2em; font-weight:bold; padding:15px; border-radius:8px; margin:20px 0; border:1px solid var(--primary-color);">最終總得分：${currentScore} / ${totalMaxScore}</div><button class="submit-btn" style="margin-top:20px;" onclick="restartGame()">↺ 從頭再玩一次</button></div>`;
                    break;
                }
            }
        }

        function renderRecord() {
            const container = document.getElementById('record-content');
            const mapContainer = document.getElementById('record-map');
            
            if (clearedStagesRecord.length === 0) {
                mapContainer.style.display = 'none';
                container.innerHTML = `<div class="locked-msg" style="margin-top: 10vh;">尚無通關紀錄</div>`;
                return;
            }
            
            mapContainer.style.display = 'block';
            let html = `<div style="background:var(--primary-color); color:#fff; padding:15px; border-radius:10px; margin-bottom:20px; font-weight:bold; text-align:center; font-size:1.2em; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">目前總得分：${currentScore} / ${totalMaxScore}</div>`;
            html += '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:2px solid var(--border-color); padding-bottom:10px;"><h2 class="story-title" style="margin:0; border:none; padding:0;">📖 冒險紀錄</h2></div>';
            
            clearedStagesRecord.forEach((record, index) => {
                html += `<div class="puzzle-box" style="text-align: left; margin-bottom: 15px; padding: 15px; border-left: 5px solid var(--primary-color);">
                    <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;">
                        <h3 style="color:var(--primary-color); margin:0; font-size:1.1em;">${index + 1}. ${record.name}</h3>
                        <span style="font-size:0.8em; color:var(--text-color); opacity:0.6;">${record.timestamp}</span>
                    </div>
                    <p style="font-size: 0.9em; color: var(--text-color); opacity: 0.9; margin: 5px 0;"><b>簡報：</b>${record.preludeStory || '無'}</p>
                    <p style="font-size: 0.9em; color: var(--text-color); opacity: 0.9; margin: 5px 0;"><b>謎題：</b>${record.puzzle || '無'}</p>
                    <p style="font-size: 0.9em; color: var(--accent-color); margin: 5px 0;"><b>答案：</b>${record.answer || '無'} <span style="background:var(--bg-color); color:var(--text-color); padding:2px 6px; border-radius:4px; margin-left:10px;">(得分: ${record.score})</span></p>
                </div>`;
            });
            container.innerHTML = html;

            if (!recordMap) {
                recordMap = L.map('record-map', { zoomControl: false }).setView([clearedStagesRecord[0].lat, clearedStagesRecord[0].lon], 15);
                L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 20 }).addTo(recordMap);
            }
        }

        function updateRecordMap() {
            if (!recordMap || clearedStagesRecord.length === 0) return;
            recordMap.invalidateSize();
            recordMarkers.forEach(m => recordMap.removeLayer(m));
            recordLines.forEach(l => recordMap.removeLayer(l));
            recordArrows.forEach(a => recordMap.removeLayer(a));
            recordMarkers = []; recordLines = []; recordArrows = [];

            const bounds = [];
            clearedStagesRecord.forEach((record, i) => {
                const marker = L.circleMarker([record.lat, record.lon], { radius: 8, fillColor: '#28a745', color: '#fff', weight: 2, fillOpacity: 1 }).addTo(recordMap).bindTooltip(`${i+1}. ${record.name}`, {permanent: true, direction: 'top'});
                recordMarkers.push(marker);
                bounds.push([record.lat, record.lon]);

                if (i > 0) {
                    const prevRecord = clearedStagesRecord[i - 1];
                    const p1 = [prevRecord.lat, prevRecord.lon];
                    const p2 = [record.lat, record.lon];
                    const line = L.polyline([p1, p2], {color: '#007bff', weight: 3, opacity: 0.6, dashArray: '5, 5'}).addTo(recordMap);
                    recordLines.push(line);
                    const point1 = recordMap.latLngToLayerPoint(p1);
                    const point2 = recordMap.latLngToLayerPoint(p2);
                    const angle = Math.atan2(point2.y - point1.y, point2.x - point1.x) * 180 / Math.PI;
                    const midLat = (p1[0] + p2[0]) / 2;
                    const midLon = (p1[1] + p2[1]) / 2;
                    const arrowIcon = L.divIcon({ html: `<div style="transform: rotate(${angle}deg);">➤</div>`, className: 'arrow-icon', iconSize: [20, 20], iconAnchor: [10, 10] });
                    const arrowMarker = L.marker([midLat, midLon], {icon: arrowIcon}).addTo(recordMap);
                    recordArrows.push(arrowMarker);
                }
            });

            if (bounds.length > 0) { recordMap.fitBounds(bounds, { padding: [30, 30] }); }
        }

        function exportRecord() {
            let content = "=== 時空起點 - 冒險紀錄 ===\n";
            content += `最終總得分：${currentScore} / ${totalMaxScore}\n\n`;
            
            clearedStagesRecord.forEach((r, i) => {
                content += `[第 ${i+1} 關] ${r.name} (${r.timestamp})\n`;
                content += `簡報：${r.preludeStory || '無'}\n`;
                content += `謎題：${r.puzzle || '無'}\n`;
                content += `答案：${r.answer || '無'} (得分:${r.score})\n\n`;
            });
            
            const blob = new Blob([content], {type: "text/plain;charset=utf-8"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = "時空起點_Record.txt";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 100);
        }

        function saveProgress() {
            const saveData = {
                currentStageId: currentStageId,
                currentPhase: currentPhase,
                currentScore: currentScore,
                clearedStagesRecord: clearedStagesRecord
            };
            const dataStr = JSON.stringify(saveData);
            const blob = new Blob([dataStr], {type: "application/json;charset=utf-8"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = "時空起點_SaveData.json";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 100);
        }

        function loadProgress(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (parsed.currentStageId && parsed.currentPhase) {
                        currentStageId = parsed.currentStageId;
                        currentPhase = parsed.currentPhase;
                        currentScore = parsed.currentScore || 0;
                        clearedStagesRecord = parsed.clearedStagesRecord || [];
                        
                        clearInterval(hintTimerInterval);
                        updateTargetDisplay();
                        renderTaskContent();
                        renderRecord();
                        showCustomAlert("✅ 進度讀取成功，歡迎回來！");
                        showTab(2);
                    } else {
                        showCustomAlert("❌ 檔案格式錯誤，無法讀取進度。");
                    }
                } catch(err) {
                    showCustomAlert("❌ 檔案格式錯誤，無法讀取進度。");
                }
                event.target.value = ''; 
            };
            reader.readAsText(file);
        }

        function startNavigating() {
            currentPhase = "NAVIGATING"; updateTargetDisplay(); renderTaskContent(); showTab(1);
            setTimeout(() => { 
                showCustomAlert("🗺️ 已將目標地點標註在地圖上，正在讀取您的位置..."); 
                updateGPS(); 
            }, 300);
        }

        function checkAnswer() {
            const val = document.getElementById('ans-input').value.trim();
            const stage = gameStages[currentStageId];
            if (!stage.answer || val.toUpperCase() === stage.answer.toUpperCase()) {
                
                const now = new Date();
                const timeString = now.getFullYear() + '/' + (now.getMonth()+1).toString().padStart(2, '0') + '/' + now.getDate().toString().padStart(2, '0') + ' ' + now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

                currentScore += stage.score;

                clearedStagesRecord.push({
                    name: stage.name, preludeStory: stage.preludeStory, puzzle: stage.puzzle,
                    answer: stage.answer || val.toUpperCase() || '無',
                    score: stage.score, lat: stage.lat, lon: stage.lon, timestamp: timeString
                });
                renderRecord(); 

                if (stage.isEnd) { currentPhase = 'END'; } else { currentPhase = 'CLEARED'; }
                updateTargetDisplay();
                renderTaskContent(); 
            } else { showCustomAlert("❌ 答案不正確，請再仔細觀察四周！"); }
        }

        function selectBranch(nextStageId) {
            if(!gameStages[nextStageId]) { showCustomAlert("Error"); return;}
            currentStageId = nextStageId;
            currentPhase = 'PRELUDE'; 
            updateTargetDisplay(); renderTaskContent(); showTab(2); 
            setTimeout(() => { showCustomAlert("新地點的任務簡報已更新，請先閱讀前情提要！"); }, 300);
        }

        function restartGame() {
            showCustomConfirm('確定要放棄當前進度並從頭開始遊戲嗎？這將會清空所有紀錄。', () => {
                currentStageId = "stage_1776696117411";
                currentPhase = 'PRELUDE';
                clearedStagesRecord = []; 
                currentScore = 0;
                updateTargetDisplay(); renderTaskContent(); renderRecord(); showTab(2);
                setTimeout(() => { showCustomAlert("遊戲已重置，請閱讀起始任務簡報！"); }, 300);
            });
        }
    </script>
</body>
</html>
